<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>payoo home page</title>
    <!-- daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <main class="flex justify-center">
        <div class="mockup-phone ">
            <div class="mockup-phone-camera "></div>
            <div class="mockup-phone-display bg-white">
                <!-- avable balance -->
                <div class="stats shadow top-12 right-0 flex justify-center">
                    <div class="stat text-center">
                        <div class="stat-title">Total Page Views</div>
                        <div id="current-balance" class="stat-value">89,400</div>
                        <div class="stat-desc">Avaliable Balance</div>
                    </div>
                </div>
                <div class="divider mt-10"></div>
                <!-- avable balance -->
                <!-- add money -->
                <div class="flex justify-center">
                    <button class="btn btn-lg">Add Money</button>
                    <button class="btn btn-lg">Cash Out</button>
                </div>
                <div class="divider mt-12"></div>


                <!-- add money form -->
                <div class="flex justify-center">
                    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
                        <div class="card-body">
                            <fieldset class="fieldset">
                                <label class="label">amount</label>
                                <input id="inputAddMoney" type="text" class="input" placeholder="amount" />
                                <label class="label">pin</label>
                                <input id="input_pin_number" type="password" class="input" placeholder="pin" autocomplete="off" />
                                
                                <button id="addMoney" class="btn btn-neutral mt-4">Add Money </button>
                            </fieldset>
                        </div>
                    </div>
                </div>
                <!-- add money form -->
                <!-- cash out start -->
                 <div class="flex justify-center">
                    <div class="card bg-base-100 w-full max-w-sm shrink-0 shadow-2xl">
                        <div class="card-body">
                            <fieldset class="fieldset">
                                <label class="label">amount</label>
                                <input id="inputAddMoney" type="text" class="input" placeholder="amount" />
                                <label class="label">pin</label>
                                <input id="input_pin_number" type="password" class="input" placeholder="pin" autocomplete="off" />
                                
                                <button id="addMoney" class="btn btn-neutral mt-4">Add Money </button>
                            </fieldset>
                        </div>
                    </div>
                </div>
                <!-- cash out end -->
            </div>
        </div>
    </main>
    <script src="/home.js"></script>
</body>

</html>
