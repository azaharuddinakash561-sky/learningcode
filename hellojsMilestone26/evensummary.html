<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js dom summary</title>
</head>
<body>
    <h1>final dom handlers</h1>
    <!-- option 1 -->
    <h3 id="handler-status">Default text</h3>
    <!-- option recap -->
    <p id="input_text_disply">Default Input Text</p>
    <input id="input-Fild" type="text">
    <button id="btn-update">Update</button>
    <br>
    <br> 
    <!-- option 1 -->
    <button onclick="handleOnClick()">Handle event by add onclick Function</button>

    <!-- option 2 -->
     <button id="even-listener">handle even by addEvenListener</button>
    <script>
        function handleOnClick(){
            // console.log('button clicked')

            const handlerStatus = document.getElementById('handler-status');
            handlerStatus.innerText = 'handled by function attached on onclick attribute';
        }
        // option 2

        document.getElementById('even-listener').addEventListener('click', function (){
            const handlerStatus = document.getElementById('handler-status');
            handlerStatus.innerText = 'text updated by add Event listener Button'
        })
        // option 2 recap
        document.getElementById('btn-update').addEventListener('click', function(){
             const inputField = document.getElementById('input-Fild');
             const inputText = inputField.value;

             const p = document.getElementById('input_text_disply')

             p.innerText = inputText;
        })
    </script>
</body>
</html>
