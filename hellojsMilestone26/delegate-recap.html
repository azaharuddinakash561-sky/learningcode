<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even Delegate</title>
</head>
<body>
    <h1>Explore Event Delegate</h1>
    <!-- ul and button section -->
    <section>
        <ul id="list-container">
            <li class="item">Lorem, ipsum dolor.</li>
            <li class="item">Possimus, cum itaque.</li>
            <li class="item">Voluptate, voluptatem suscipit!</li>
            <li class="item">Non, aliquam quidem.</li>
            <li class="item">Ratione, rerum rem.</li>
            <li class="item">Alias, recusandae veniam.</li>
        </ul>
        <button id="btn-add-item">Add Item</button>
    </section>
    <!-- script part -->
    <script>
        // item ar jono for loop ar use kora lagcea 
        // const items = document.getElementsByClassName('item');
        // // console.log(items);
        // for (const item of items) {
        //     item.addEventListener('click', function (event) {
        //         // console.log(event.target.parentNode)
        //         event.target.parentNode.removeChild(event.target)
        //     })
        // }
        document.getElementById('list-container').addEventListener('click', function(event){
            // console.log(event.target)
            event.target.parentNode.removeChild(event.target)
        })
        

        document.getElementById('btn-add-item').addEventListener('click', function () {
            const listContainer = document.getElementById('list-container');
            const li = document.createElement('li');
            li.innerText = 'brand New car';
            li.classList.add('item')
            listContainer.appendChild(li);
        })
    </script>
</body>
</html>
