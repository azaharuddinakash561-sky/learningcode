<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Delegate</title>
</head>
<body>
    <h1>Explore Event Delegate</h1>
    <section>
        <ul id="list-container">
                <li class="item">Lorem ipsum dolor sit.</li>
                <li class="item">Lorem ipsum dolor sit tite.</li>
                <li class="item">Lorem ipsum dolor sit name.</li>
                <li class="item">Lorem ipsum dolor sit meter.</li>
                <li class="item">Lorem ipsum dolor sit zaha.</li>
                <li class="item">Lorem ipsum dolor sit  gma.</li>
        </ul>
        <button id="btn-add-item">Add Item</button>
    </section>
    <script>
        const items = document.getElementsByClassName('item');
        for (const item of items) {
            item.addEventListener('click', function(event){
                event.target.parentNode.removeChild(event.target)
                // console.log(event.target.parentNode);
                // console.log(event.target);
                // console.log(item);
            })
        }

        document.getElementById("btn-add-item").addEventListener('click', function(){
            const listContainer =document.getElementById('list-container') ;
            const li = document.createAttribute('li');
            li.innerText = 'brand new item add';
            li.classList.add('item');
            listContainer.appendChild(li);
        })
    </script>
</body>
</html>
