<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f7f7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 20px 40px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
    }
    button {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    #result {
      margin-top: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>BMI Calculator</h2>
    <label>Weight (kg):</label>
    <input type="number" id="weight" placeholder="Enter your weight">

    <label>Height (m):</label>
    <input type="number" id="height" step="0.01" placeholder="Enter your height">

    <button onclick="calculateBMI()">Calculate</button>

    <p id="result"></p>
  </div>

  <script>
    function calculateBMI() {
      let weight = document.getElementById("weight").value;
      let height = document.getElementById("height").value;

      if (weight > 0 && height > 0) {
        let bmi = weight / (height * height);
        let result = "";

        if (bmi < 18.5) {
          result = "Underweight 😔";
        } else if (bmi >= 18.5 && bmi < 24.9) {
          result = "Normal weight 😊";
        } else if (bmi >= 25 && bmi < 29.9) {
          result = "Overweight 😐";
        } else {
          result = "Obesity 😟";
        }

        document.getElementById("result").innerHTML = `Your BMI is ${bmi.toFixed(2)} - ${result}`;
      } else {
        document.getElementById("result").innerHTML = "Please enter valid weight and height values.";
      }
    }
  </script>

</body>
</html>
